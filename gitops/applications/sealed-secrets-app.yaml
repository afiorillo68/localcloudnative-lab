# gitops/applications/sealed-secrets-app.yaml
#
# Application ArgoCD per il controller Sealed Secrets.
# Namespace: platform-sealed-secrets (ADR-001 D4).
# Gestione segreti GitOps via Sealed Secrets (ADR-001 D7).
# Kustomize + Helm generator, --enable-helm gia' attivo in argocd-cm (ADR-001 D8).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/description: "Sealed Secrets controller — gestione segreti GitOps (ADR-001 D7)"
spec:
  project: default

  source:
    repoURL: https://github.com/afiorillo68/localcloudnative-lab
    targetRevision: HEAD
    path: platform/sealed-secrets/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: platform-sealed-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
