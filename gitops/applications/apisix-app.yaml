# gitops/applications/apisix-app.yaml
#
# Application ArgoCD per Apache Apisix (Fase 3).
# Punta all'overlay dev di Kustomize: platform/apisix/overlays/dev/.
# La struttura base + overlays/dev e' predisposta; verra' popolata in Fase 3.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apisix
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/description: "Apache Apisix — API Gateway / Ingress (Fase 3)"
spec:
  project: default

  source:
    repoURL: https://github.com/afiorillo68/localcloudnative-lab
    targetRevision: HEAD
    path: platform/apisix/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: platform-apisix

  syncPolicy:
    syncOptions:
      - CreateNamespace=true

  info:
    - name: "stato"
      value: "In attesa di Fase 3 — platform/apisix/ da popolare"
