# gitops/applications/apisix-app.yaml
#
# Application ArgoCD per Apache APISIX gateway + Ingress Controller (Phase 3 — Step 5a).
# Punta all'overlay dev di Kustomize: platform/apisix/overlays/dev/.
#
# Il sync automatico e' abilitato. Il primo deploy sara' parzialmente
# Degraded per le ApisixTls (argocd-tls-secret e keycloak-tls-secret
# non esistono ancora): comportamento atteso, si risolve in Step 5b.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apisix
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/description: "Apache APISIX gateway + Ingress Controller, esposizione Argo CD e Keycloak con TLS self-signed"
spec:
  project: default

  source:
    repoURL: https://github.com/afiorillo68/localcloudnative-lab
    targetRevision: HEAD
    path: platform/apisix/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: platform-apisix

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

  info:
    - name: "step"
      value: "Step 5a complete — awaiting TLS SealedSecrets from Step 5b"
