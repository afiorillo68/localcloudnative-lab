# gitops/applications/mongodb-app.yaml
#
# Application ArgoCD per MongoDB Community (Fase 3).
# Punta all'overlay dev di Kustomize: platform/mongodb/overlays/dev/.
# La struttura base + overlays/dev e' predisposta; verra' popolata in Fase 3.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mongodb
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/description: "MongoDB Community — Persistent store (Fase 3)"
spec:
  project: default

  source:
    repoURL: https://github.com/afiorillo68/localcloudnative-lab
    targetRevision: HEAD
    path: platform/mongodb/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: platform-mongodb

  syncPolicy:
    syncOptions:
      - CreateNamespace=true

  info:
    - name: "stato"
      value: "In attesa di Fase 3 — platform/mongodb/ da popolare"
