# apps/mongodb-app.yaml
#
# Application ArgoCD per MongoDB Community (Fase 3).
# Sospesa fino a quando platform/mongodb/ non e' popolata con chart Helm.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mongodb
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/description: "MongoDB Community — Persistent store (Fase 3)"
spec:
  project: default

  source:
    repoURL: https://github.com/afiorillo68/localcloudnative-lab
    targetRevision: HEAD
    path: platform/mongodb

  destination:
    server: https://kubernetes.default.svc
    namespace: platform-mongodb

  syncPolicy:
    syncOptions:
      - CreateNamespace=true

  info:
    - name: "stato"
      value: "In attesa di Fase 3 — platform/mongodb/ da popolare"
