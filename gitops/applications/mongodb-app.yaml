# gitops/applications/mongodb-app.yaml
#
# Application ArgoCD per MongoDB Community 8.0 — manifest puri Kustomize
# con immagine mongo:8.0 ufficiale (multi-arch amd64+arm64). ADR-003.
# Topology: replicaset rs0 a 1 nodo, SCRAM auth, PV local-path 4Gi.
#
# Il primo deploy richiede la presenza dei SealedSecret nel repo:
# - mongodb-root-credentials-sealed.yaml (campi: password, replica-set-key)
# - mongodb-app-credentials-sealed.yaml  (campo: password)
# Fino al commit dei SealedSecret il pod non parte (atteso).
# Appena committati, selfHeal: true triggera la riconciliazione automatica.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mongodb
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/description: "MongoDB 8.0 — replica set 1 nodo, manifest puri arm64-friendly (ADR-003)"
spec:
  project: default

  source:
    repoURL: https://github.com/afiorillo68/localcloudnative-lab
    targetRevision: HEAD
    path: platform/mongodb/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: platform-mongodb

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
