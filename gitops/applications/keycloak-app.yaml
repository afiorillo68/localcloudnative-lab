# gitops/applications/keycloak-app.yaml
#
# Application ArgoCD per Keycloak (Phase 3 — Step 4a).
# Punta all'overlay dev di Kustomize: platform/keycloak/overlays/dev/.
#
# Il sync automatico e' abilitato. Il primo deploy completo attendera'
# la presenza dei SealedSecret in platform/keycloak/base/ (Step 4b).
# Fino a quel momento la Helm release sara' in errore per Secret mancanti:
# comportamento atteso, si risolve automaticamente dopo Step 4b.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/description: "Keycloak 26.x con PostgreSQL subchart, realm 'lcn' minimale, attesa SealedSecret"
spec:
  project: default

  source:
    repoURL: https://github.com/afiorillo68/localcloudnative-lab
    targetRevision: HEAD
    path: platform/keycloak/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: platform-keycloak

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

  info:
    - name: "step"
      value: "Step 4a complete — awaiting SealedSecrets from Step 4b"
