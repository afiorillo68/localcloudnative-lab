# gitops/applications/keycloak-app.yaml
#
# Application ArgoCD per Keycloak (Fase 3).
# Punta all'overlay dev di Kustomize: platform/keycloak/overlays/dev/.
# La struttura base + overlays/dev e' predisposta; verra' popolata in Fase 3.
# Per abilitare: popolare platform/keycloak/base/ e impostare syncPolicy.automated.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/description: "Keycloak OIDC — Identity Provider (Fase 3)"
spec:
  project: default

  source:
    repoURL: https://github.com/afiorillo68/localcloudnative-lab
    targetRevision: HEAD
    path: platform/keycloak/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: platform-keycloak

  # Sospesa: platform/keycloak/base/ non e' ancora popolata (Fase 3).
  # Cambiare in syncPolicy.automated quando base/ conterra' risorse reali.
  syncPolicy:
    syncOptions:
      - CreateNamespace=true

  info:
    - name: "stato"
      value: "In attesa di Fase 3 — platform/keycloak/ da popolare"
