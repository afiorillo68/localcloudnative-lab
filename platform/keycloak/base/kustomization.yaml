# platform/keycloak/base/kustomization.yaml
#
# Base Kustomize per Keycloak con PostgreSQL come subchart.
# Riferimenti architetturali:
# - ADR-001 D6 (struttura base + overlays/dev)
# - ADR-001 D7 (segreti via Sealed Secrets)
# - ADR-001 D8 (Kustomize con Helm come generator)
# - ADR-002 (override registry a bitnamilegacy)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: keycloak
    repo: oci://registry-1.docker.io/bitnamicharts
    version: 25.2.0
    releaseName: keycloak
    namespace: platform-keycloak
    valuesFile: values-common.yaml
    includeCRDs: false

resources:
  - namespace.yaml
  - configmap-realm.yaml
  - keycloak-admin-credentials-sealed.yaml
  - keycloak-postgres-credentials-sealed.yaml
