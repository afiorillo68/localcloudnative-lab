# platform/mongodb/base/service-headless.yaml
#
# Service headless per il replica set rs0.
# Usato da MongoDB internamente per il peer discovery e dall'hostname
# del pod (mongodb-0.mongodb-headless.platform-mongodb.svc.cluster.local).
# Riferimento architetturale: ADR-003 (manifest puri, immagine mongo:8.0)
apiVersion: v1
kind: Service
metadata:
  name: mongodb-headless
  namespace: platform-mongodb
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/component: database
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: mongodb
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
