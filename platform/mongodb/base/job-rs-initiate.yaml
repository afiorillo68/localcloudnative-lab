# platform/mongodb/base/job-rs-initiate.yaml
#
# Job idempotente per l'inizializzazione del replica set MongoDB e
# la creazione dell'utente applicativo.
#
# Pattern: PostSync hook di Argo CD. Argo CD esegue questo Job
# dopo che StatefulSet e Service sono stati sincronizzati.
#
# Idempotenza:
# - Se rs.status() restituisce 'ok=1', skip rs.initiate()
# - Se db.appdb.getUser('appuser') restituisce null, crea l'utente
# - Altrimenti, skip la creazione
#
# Riferimenti architetturali:
# - ADR-001 D7 (segreti via Sealed Secrets)
# - ADR-003 (manifest puri MongoDB)
# - Decisione 3.3 di Step 3 (utente applicativo: appuser su appdb)
apiVersion: batch/v1
kind: Job
metadata:
  name: mongodb-rs-initiate
  namespace: platform-mongodb
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/component: init
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb
        app.kubernetes.io/component: init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: mongo:7.0
          imagePullPolicy: IfNotPresent
          env:
            - name: ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-root-credentials
                  key: password
            - name: APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-app-credentials
                  key: password
            - name: MONGO_HOST
              value: mongodb-0.mongodb-headless.platform-mongodb.svc.cluster.local
          command:
            - bash
            - -c
            - |
              set -e
              set -o pipefail

              echo "==> Attendo che mongod sia pronto..."
              until mongosh --host "$MONGO_HOST:27017" \
                -u root -p "$ROOT_PASSWORD" --authenticationDatabase admin \
                --quiet --eval "db.adminCommand('ping').ok" 2>/dev/null \
                | grep -q 1; do
                echo "    mongod non ancora pronto, retry in 5s..."
                sleep 5
              done
              echo "==> mongod pronto."

              echo "==> Verifico stato replica set..."
              RS_OK=$(mongosh --host "$MONGO_HOST:27017" \
                -u root -p "$ROOT_PASSWORD" --authenticationDatabase admin \
                --quiet --eval "try { rs.status().ok } catch(e) { 0 }" 2>/dev/null \
                | tr -d '[:space:]')

              if [ "$RS_OK" = "1" ]; then
                echo "==> Replica set gia' inizializzato (ok=1). Skip rs.initiate()."
              else
                echo "==> Inizializzazione replica set..."
                mongosh --host "$MONGO_HOST:27017" \
                  -u root -p "$ROOT_PASSWORD" --authenticationDatabase admin \
                  --eval "rs.initiate({_id: 'rs0', members: [{_id: 0, host: '$MONGO_HOST:27017'}]})"

                echo "==> Attendo PRIMARY..."
                until mongosh --host "$MONGO_HOST:27017" \
                  -u root -p "$ROOT_PASSWORD" --authenticationDatabase admin \
                  --quiet --eval "rs.status().members[0].stateStr" 2>/dev/null \
                  | grep -q PRIMARY; do
                  echo "    nodo non ancora PRIMARY, retry in 3s..."
                  sleep 3
                done
                echo "==> Nodo PRIMARY."
              fi

              echo "==> Verifico/creo utente applicativo 'appuser' su database 'appdb'..."
              USER_EXISTS=$(mongosh --host "$MONGO_HOST:27017" \
                -u root -p "$ROOT_PASSWORD" --authenticationDatabase admin \
                --quiet --eval "var u = db.getSiblingDB('appdb').getUser('appuser'); if (u === null) { print('NO'); } else { print('YES'); }" 2>/dev/null \
                | tail -1 \
                | tr -d '[:space:]')

              if [ "$USER_EXISTS" = "YES" ]; then
                echo "==> Utente 'appuser' gia' esistente. Skip createUser."
              elif [ "$USER_EXISTS" = "NO" ]; then
                echo "==> Creazione utente 'appuser'..."
                mongosh --host "$MONGO_HOST:27017" \
                  -u root -p "$ROOT_PASSWORD" --authenticationDatabase admin \
                  --eval "db.getSiblingDB('appdb').createUser({user: 'appuser', pwd: '$APP_PASSWORD', roles: [{role: 'readWrite', db: 'appdb'}]})"
                echo "==> Utente 'appuser' creato."
              else
                echo "==> ERRORE: stato utente ambiguo (output: '$USER_EXISTS'). Abort."
                exit 1
              fi

              echo "==> Verifica finale: connessione come appuser..."
              mongosh --host "$MONGO_HOST:27017" \
                -u appuser -p "$APP_PASSWORD" --authenticationDatabase appdb appdb \
                --quiet --eval "db.runCommand({connectionStatus: 1}).authInfo.authenticatedUsers"
              echo "==> Connessione applicativa OK."

              echo "==> Inizializzazione completata con successo."
