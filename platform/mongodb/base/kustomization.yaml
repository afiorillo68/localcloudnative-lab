# platform/mongodb/base/kustomization.yaml
#
# Base Kustomize per MongoDB Community.
# Riferimenti architetturali:
# - ADR-001 D6 (struttura base + overlays/dev)
# - ADR-001 D7 (segreti via Sealed Secrets)
# - ADR-001 D8 (Kustomize con Helm come generator)
# - ADR-002 (override registry a bitnamilegacy)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: mongodb
    repo: https://charts.bitnami.com/bitnami
    version: 18.6.31
    releaseName: mongodb
    namespace: platform-mongodb
    valuesFile: values-common.yaml
    includeCRDs: true

# I SealedSecret per le credenziali root e applicative verranno
# aggiunti in un commit separato dopo essere stati cifrati con
# kubeseal sul Mac dell'utente. Vedi runbook
# docs/how-to/sealed-secrets-operations.md sezione 5.
resources: []
