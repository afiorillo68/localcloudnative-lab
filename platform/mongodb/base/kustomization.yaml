# platform/mongodb/base/kustomization.yaml
#
# Base Kustomize per MongoDB Community 8.0 — manifest puri.
# Eccezione rispetto al pattern Helm generator di ADR-001 D8:
# si usa Kustomize puro perche' l'immagine bitnamilegacy/mongodb e'
# amd64-only e non funziona su Apple Silicon (cfr. ADR-003).
#
# Riferimenti architetturali:
# - ADR-001 D6 (struttura base + overlays/dev)
# - ADR-001 D7 (segreti via Sealed Secrets)
# - ADR-003 (manifest puri, immagine mongo:8.0 ufficiale multi-arch)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - service-headless.yaml
  - service.yaml
  - statefulset.yaml
  - job-rs-initiate.yaml
  - mongodb-root-credentials-sealed.yaml
  - mongodb-app-credentials-sealed.yaml
