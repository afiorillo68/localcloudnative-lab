# platform/mongodb/overlays/dev/kustomization.yaml
#
# Overlay 'dev' per MongoDB.
# Eredita interamente da base/ senza patch specifiche per ora.
# Gli override per altri ambienti (es. 'stage') verranno aggiunti
# in overlays/<env>/ secondo il runbook docs/how-to/add-environment.md.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: platform-mongodb

resources:
  - ../../base
