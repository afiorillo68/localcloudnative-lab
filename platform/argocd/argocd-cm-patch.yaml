# platform/argocd/argocd-cm-patch.yaml
#
# Patch al ConfigMap argocd-cm per il laboratorio locale.
# Applicata in modo atomico da: kubectl apply -k platform/argocd/
#
# NON include server.insecure: la chiave non ha effetto in ArgoCD v2.x
# (quella configurazione va in argocd-cmd-params-cm, non in argocd-cm).
# Con il port-forward su 443 non e' necessaria: il server usa HTTPS con
# certificato self-signed, il browser avverte ma la connessione funziona.
# In Fase 3 Apisix terminera' il TLS e ProxyPass verso argocd-server:443.
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # Tracking via annotation invece che label: piu' affidabile con Helm chart
  # che gestiscono gia' le proprie label. Evita conflitti di ownership.
  application.resourceTrackingMethod: annotation

  # Timeout sincronizzazione: 5 minuti invece dei 3 di default.
  # Margine per pull lente in laboratorio (immagini grandi, rete variabile).
  timeout.reconciliation: 300s
