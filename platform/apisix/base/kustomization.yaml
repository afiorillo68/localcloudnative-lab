# platform/apisix/base/kustomization.yaml
#
# Base Kustomize per Apache APISIX gateway + Ingress Controller.
# Riferimenti architetturali:
# - ADR-001 D6 (struttura base + overlays/dev)
# - ADR-001 D8 (Kustomize con Helm come generator)
# NOTA: NON applichiamo ADR-002 (override registry bitnamilegacy)
# perche' il chart upstream Apache pubblica immagini direttamente
# in docker.io/apache/* (multi-arch verificate).
# NOTA ETCD: il subchart bitnami/etcd e' disabilitato. Etcd e' deployato
# standalone tramite etcd-standalone.yaml (quay.io/coreos/etcd:v3.5.21).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: apisix
    repo: https://apache.github.io/apisix-helm-chart
    version: 2.14.0
    releaseName: apisix
    namespace: platform-apisix
    valuesFile: values-common.yaml
    includeCRDs: true

resources:
  - namespace.yaml
  - etcd-standalone.yaml
  - apisixroute-argocd.yaml
  - apisixroute-keycloak.yaml
  - apisixtls-argocd.yaml
  - apisixtls-keycloak.yaml
  - argocd-tls-secret-sealed.yaml
  - keycloak-tls-secret-sealed.yaml
  # I SealedSecret per i certificati TLS (argocd-tls-secret e
  # keycloak-tls-secret) verranno aggiunti in un commit separato
  # dopo essere stati generati e cifrati con kubeseal in Step 5b.
  # Vedi runbook docs/how-to/sealed-secrets-operations.md sezione 7.
