# ApisixTls per il certificato self-signed di keycloak.lcn-lab.local
#
# NOTA: il Secret keycloak-tls-secret deve esistere nel namespace
# platform-keycloak prima che l'ApisixTls venga riconciliata.
# Lo creiamo come SealedSecret in Step 5b (vedi runbook sezione 7).
apiVersion: apisix.apache.org/v2
kind: ApisixTls
metadata:
  name: keycloak-tls
  namespace: platform-keycloak
spec:
  ingressClassName: apisix
  hosts:
    - keycloak.lcn-lab.local
  secret:
    name: keycloak-tls-secret
    namespace: platform-keycloak
