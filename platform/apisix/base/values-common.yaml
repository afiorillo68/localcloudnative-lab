# platform/apisix/base/values-common.yaml
#
# Valori Helm per Apache APISIX gateway + Ingress Controller.
# Versione chart: 2.14.0 (APISIX 3.16.0)
# Pattern: deploy combinato gateway + ingress controller in un'unica release Helm.
#
# NOTA SCHEMA: nel chart apisix/apisix, replicaCount e resources sono
# top-level (non sotto apisix:). Il blocco apisix: contiene configurazione
# specifica del processo APISIX (ssl, router, plugins, ecc.).
#
# NOTA ETCD: il subchart bitnami/etcd e' disabilitato (etcd.enabled: false).
# Etcd e' deployato standalone in platform/apisix/base/etcd-standalone.yaml.
# Apisix e' configurato per usarlo tramite externalEtcd.host.
# Motivazione: il subchart bitnami/etcd registra hook Helm pre-upgrade/pre-install
# che ArgoCD interpreta come PreSync, causando un deadlock su installazione fresh.

# ----- Architettura -----
# Single-replica per lab (no HA)
replicaCount: 1

# ----- Risorse modeste per il Mac -----
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ----- APISIX process config -----
apisix:
  # SSL termination al gateway
  ssl:
    enabled: true

# ----- etcd: subchart disabilitato, etcd standalone esterno -----
# Il subchart bitnami/etcd causa un deadlock PreSync su ArgoCD.
# Usiamo etcd standalone deployato come StatefulSet separato.
etcd:
  enabled: false

# Punta all'etcd standalone nel namespace platform-apisix.
# externalEtcd viene usato quando etcd.enabled: false.
# user/password vuoti = no authentication (lab-internal, non esposto).
externalEtcd:
  host:
    - "http://etcd-standalone.platform-apisix.svc.cluster.local:2379"
  user: ""
  password: ""

# ----- Service esposizione -----
# type LoadBalancer con loadbalancer integrato di k3d.
# Le porte 80/443 sono gia' mappate dal cluster k3d (vedi cluster/k3d-cluster.yaml).
service:
  type: LoadBalancer
  http:
    enabled: true
    servicePort: 80
    containerPort: 9080
  tls:
    servicePort: 443
    # containerPort e' 9443 per default (apisix.ssl.containerPort)

# ----- Ingress Controller -----
# Abilitato come subchart della stessa release Helm (decisione 5.2).
ingress-controller:
  enabled: true
  config:
    apisix:
      serviceNamespace: platform-apisix
      serviceName: apisix-admin
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# ----- Metrics/monitoring disabilitati -----
metrics:
  serviceMonitor:
    enabled: false
